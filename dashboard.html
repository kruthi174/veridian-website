<!DOCTYPE html>
<html>
<head>
  <title>Veridian Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      display: flex;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                  url('https://images.unsplash.com/photo-1469474968028-56623f02e42e') no-repeat center/cover;
      color: white;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      height: 100vh;
      background: rgba(0,0,0,0.6);
      padding: 20px;
      position: fixed;
    }

    .sidebar h2 {
      margin-bottom: 20px;
    }

    .sidebar a {
      display: block;
      padding: 10px;
      margin: 10px 0;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    .sidebar a:hover {
      background: #00b894;
    }

    /* MAIN */
    .main {
      margin-left: 220px;
      padding: 20px;
      width: 100%;
    }

    /* GRID */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .right {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* BOXES */
    .chart-box {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 12px;
      height: 280px;
    }

    canvas {
      width: 100% !important;
      height: 220px !important;
    }

    /* POPUP */
    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .popup.active {
      display: flex;
    }

    .popup-box {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    select, input, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #00b894;
      color: white;
      cursor: pointer;
    }

    @media(max-width:768px){
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🌱 Veridian</h2>
  <a href="#">Dashboard</a>
  <a href="#" onclick="toggleForm()">🚨 Report Issue</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

  <h2 style="margin-bottom:20px;">📊 Dashboard</h2>

  <div class="dashboard-grid">

    <!-- LEFT -->
    <div class="left">
      <div class="chart-box">
        <h3>Issue Count</h3>
        <canvas id="lineChart"></canvas>
      </div>

      <div class="chart-box">
        <h3>Distribution</h3>
        <canvas id="pieChart"></canvas>
      </div>
    </div>

    <!-- RIGHT (EMPTY NOW CLEAN UI) -->
    <div class="right"></div>

  </div>

</div>

<!-- POPUP -->
<div id="issuePopup" class="popup">
  <div class="popup-box">

    <h3>🚨 Report Issue</h3>

    <select id="issueType">
      <option value="water">Water</option>
      <option value="air">Air</option>
      <option value="forest">Forest</option>
    </select>

    <input type="text" id="issueDesc" placeholder="Describe issue">

    <button onclick="submitIssue()">Submit</button>
    <button onclick="toggleForm()">Close</button>

  </div>
</div>

<!-- LOGIN CHECK -->
<script>
if(localStorage.getItem("isLoggedIn") !== "true") {
  window.location.href = "login.html";
}
</script>

<script>

// DATA
let data = { water: 10, air: 8, forest: 6 };

if(localStorage.getItem("envData")){
  data = JSON.parse(localStorage.getItem("envData"));
}

let lineChart, pieChart;

// LOAD CHARTS
window.onload = function(){

  lineChart = new Chart(document.getElementById("lineChart"), {
    type:"bar",
    data:{
      labels:["Water","Air","Forest"],
      datasets:[{
        data:[data.water,data.air,data.forest]
      }]
    }
  });

  pieChart = new Chart(document.getElementById("pieChart"), {
    type:"doughnut",
    data:{
      labels:["Water","Air","Forest"],
      datasets:[{
        data:[data.water,data.air,data.forest]
      }]
    }
  });

};

// SUBMIT ISSUE
function submitIssue(){
  const type = document.getElementById("issueType").value;
  data[type]++;
  localStorage.setItem("envData", JSON.stringify(data));
  updateCharts();
  toggleForm();
}

// UPDATE CHARTS
function updateCharts(){
  lineChart.data.datasets[0].data = [data.water,data.air,data.forest];
  lineChart.update();

  pieChart.data.datasets[0].data = [data.water,data.air,data.forest];
  pieChart.update();
}

// POPUP
function toggleForm(){
  document.getElementById("issuePopup").classList.toggle("active");
}

// LOGOUT
function logout(){
  localStorage.removeItem("isLoggedIn");
  window.location.href="login.html";
}

</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
