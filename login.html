<!DOCTYPE html>
<html>
<head>
  <title>Login - Veridian Sentinel</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                  url('https://images.unsplash.com/photo-1469474968028-56623f02e42e') no-repeat center/cover;
    }

    /* LOGIN BOX */
    .login-container {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      text-align: center;
      color: white;
      width: 320px;
      animation: fadeIn 1.5s ease;
    }

    .login-container h2 {
      margin-bottom: 10px;
    }

    .login-container p {
      margin-bottom: 20px;
      font-size: 14px;
    }

    /* INPUTS */
    .login-container input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      outline: none;
    }

    /* BUTTON */
    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 25px;
      background: #00b894;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #019875;
      transform: scale(1.05);
    }

    /* LINK */
    .link {
      margin-top: 15px;
      display: block;
      color: #ddd;
      font-size: 14px;
      text-decoration: none;
    }

    .link:hover {
      color: white;
    }

    /* ANIMATION */
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<div class="login-container">
  <h2>🌱 Veridian Sentinel</h2>
  <p>Login to Dashboard</p>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button class="btn" onclick="login()">Login</button>

  <a href="index.html" class="link">← Back to Home</a>
</div>

<script>
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if(user === "admin" && pass === "1234") {

    // Save login status
    localStorage.setItem("isLoggedIn", "true");

    // Go to dashboard
    window.location.href = "dashboard.html";

  } else {
    alert("Invalid Login!");
  }
}
</script>

</body>
</html>
